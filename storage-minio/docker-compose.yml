version: "2"

services:
  sn-minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data
    networks:
      - codepush-net

networks:
  codepush-net:
    external: true
